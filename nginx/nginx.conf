#frontend
server {
  listen 80;
  server_name film-react-nest.kinoteatr.nomorepartiessite.ru;

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }

  location /content/ {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
}
#api
server {
  listen 80;
  server_name api.film-react-nest.kino.nomorepartiessite.ru;

  location / {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}